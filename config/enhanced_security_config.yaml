# eTracee 安全检测规则配置
# 基于 Falco 和 Tracee 官方规则改编，适配 eTracee 规则引擎
# 参考: https://github.com/falcosecurity/rules
# 参考: https://github.com/aquasecurity/tracee

global:
  enable_file_events: true
  enable_network_events: true
  enable_process_events: true
  enable_permission_events: true
  enable_memory_events: true
  min_uid_filter: 0
  max_uid_filter: 65535
  max_events_per_second: 10000
  ring_buffer_size: 0
  alert_throttle_seconds: 60
  max_alert_history: 1000
  enable_rule_stats: true
  log_level: info

# ==================== 文件系统安全规则 ====================
detection_rules:
  file:
    # ----- 敏感文件访问检测 -----
    - name: Read sensitive file untrusted
      description: |
        非特权用户尝试读取敏感文件（如/etc/passwd、/etc/shadow等）。
        这是凭证窃取行为的典型特征，攻击者常通过读取这些文件来获取用户信息和密码哈希。
        MITRE ATT&CK: T1555 - Credentials from Password Stores
      conditions:
        - event_type: file_open
        - filename: "regex:/etc/(passwd|shadow|sudoers|group|gshadow|security/opasswd)"
        - uid: ">=1000"
      severity: medium
      logic_operator: AND
      tags:
        - maturity_stable
        - host
        - filesystem
        - mitre_credential_access
        - T1555
      enabled: true
      throttle_seconds: 60
      actions:
        - log
      category: file

    - name: Write sensitive file
      description: |
        尝试写入敏感系统文件。这类行为通常是恶意软件持久化或提权的一部分。
        攻击者可能修改/etc/passwd添加后门用户，或修改/etc/sudoers获取root权限。
        MITRE ATT&CK: T1548.001 - Abuse Elevation Control Mechanisms
      conditions:
        - event_type: file_modify
        - filename: "regex:/etc/(passwd|shadow|sudoers|group|gshadow|shells|profile|bashrc|profile.d/)"
      severity: high
      logic_operator: AND
      tags:
        - maturity_stable
        - host
        - filesystem
        - mitre_persistence
        - T1548.001
      enabled: true
      throttle_seconds: 30
      actions:
        - log
      category: file

    - name: SSH key file access
      description: |
        访问SSH私钥文件（id_rsa, id_dsa, id_ecdsa, id_ed25519）。
        攻击者可能窃取SSH私钥以实现横向移动或持久访问。
        MITRE ATT&CK: T1552.004 - Credentials from Password Stores: Private Keys
      conditions:
        - event_type: file_open
        - filename: "regex:.*id_(rsa|dsa|ecdsa|ed25519)(\\.pub)?$"
      severity: medium
      logic_operator: AND
      tags:
        - maturity_stable
        - host
        - filesystem
        - mitre_credential_access
        - T1552.004
      enabled: true
      throttle_seconds: 60
      actions:
        - log
      category: file

    - name: SSH authorized_keys modification
      description: |
        修改SSH authorized_keys文件。攻击者可能添加自己的公钥以实现持久化访问。
        MITRE ATT&CK: T1098.004 - Account Manipulation: SSH Authorized Keys
      conditions:
        - event_type: file_modify
        - filename: "regex:.*\\.ssh/authorized_keys(\\.d/.*)?$"
      severity: high
      logic_operator: AND
      tags:
        - maturity_stable
        - host
        - filesystem
        - mitre_persistence
        - T1098.004
      enabled: true
      throttle_seconds: 30
      actions:
        - log
      category: file

    # ----- 日志篡改检测 -----
    - name: Clear log activities
      description: |
        检测清除关键访问日志文件的行为，通常是攻击者试图销毁证据。
        MITRE ATT&CK: T1070.001 - Indicator Removal on Host: Clear Linux or Mac System Logs
      conditions:
        - event_type: file_open
        - filename: "regex:/var/log/(auth\\.log|secure|syslog|messages|kern\\.log|audit/audit\\.log)"
        - mode: "regex:.*O_TRUNC.*"
      severity: high
      logic_operator: AND
      tags:
        - maturity_stable
        - host
        - filesystem
        - mitre_defense_evasion
        - T1070.001
      enabled: true
      throttle_seconds: 30
      actions:
        - log
      category: file

    - name: Delete log files
      description: |
        删除日志文件，攻击者常用的痕迹清理手段。
        MITRE ATT&CK: T1070.004 - Indicator Removal on Host: File Deletion
      conditions:
        - event_type: file_delete
        - filename: "regex:/var/log/.*\\.log(\\.[0-9]+)?$"
      severity: high
      logic_operator: AND
      tags:
        - maturity_stable
        - host
        - filesystem
        - mitre_defense_evasion
        - T1070.004
      enabled: true
      throttle_seconds: 30
      actions:
        - log
      category: file

    # ----- 可疑文件操作 -----
    - name: Create file in critical directory
      description: |
        在关键系统目录创建文件，可能是恶意软件持久化或提权尝试。
        MITRE ATT&CK: T1547 - Boot or Logon Autostart Execution
      conditions:
        - event_type: file_open
        - filename: "regex:/etc/(cron\\.d|cron\\.daily|cron\\.hourly|cron\\.monthly|cron\\.weekly|init\\.d|systemd/system|rc\\.local|profile\\.d)/.*"
        - mode: "regex:.*O_CREAT.*"
      severity: medium
      logic_operator: AND
      tags:
        - maturity_stable
        - host
        - filesystem
        - mitre_persistence
        - T1547
      enabled: true
      throttle_seconds: 60
      actions:
        - log
      category: file

    - name: Hidden file creation
      description: |
        创建隐藏文件（以.开头），攻击者常用此方式隐藏恶意文件。
        MITRE ATT&CK: T1564.001 - Hide Artifacts: Hidden Files and Directories
      conditions:
        - event_type: file_open
        - filename: "regex:.*/\\.[^/]+$"
        - mode: "regex:.*O_CREAT.*"
      severity: low
      logic_operator: AND
      tags:
        - maturity_stable
        - host
        - filesystem
        - mitre_defense_evasion
        - T1564.001
      enabled: true
      throttle_seconds: 120
      actions:
        - log
      category: file

    - name: Execution from /dev/shm
      description: |
        从/dev/shm执行文件，这是内存文件系统，常被攻击者用于运行无文件恶意软件。
        MITRE ATT&CK: T1059.004 - Command and Scripting Interpreter: Bash
      conditions:
        - event_type: process_create
        - filename: "regex:/dev/shm/.*"
      severity: high
      logic_operator: AND
      tags:
        - maturity_stable
        - host
        - mitre_defense_evasion
        - T1059.004
      enabled: true
      throttle_seconds: 30
      actions:
        - log
      category: file

    - name: Execution from /tmp
      description: |
        从/tmp目录执行文件，攻击者常在此目录存放和执行恶意程序。
      conditions:
        - event_type: process_create
        - filename: "regex:/tmp/.*"
        - comm: "regex:^(bash|sh|python|perl|ruby|php)$"
      severity: medium
      logic_operator: AND
      tags:
        - maturity_stable
        - host
        - mitre_execution
        - T1059
      enabled: true
      throttle_seconds: 60
      actions:
        - log
      category: file

  # ==================== 网络安全规则 ====================
  network:
    # ----- 反弹Shell检测 -----
    - name: Reverse shell detected
      description: |
        检测反弹Shell行为。当shell进程（bash/sh/zsh）建立出站网络连接时触发。
        这是典型的远程控制行为，攻击者利用反弹Shell控制受害主机。
        MITRE ATT&CK: T1059.004 - Command and Scripting Interpreter: Bash
      conditions:
        - event_type: connect
        - comm: "regex:^(bash|sh|zsh|fish|dash|ksh|csh|tcsh)$"
      severity: critical
      logic_operator: AND
      tags:
        - maturity_stable
        - host
        - network
        - mitre_execution
        - T1059.004
      enabled: true
      throttle_seconds: 10
      actions:
        - log
      category: network

    - name: Netcat remote code execution
      description: |
        检测使用nc/ncat进行远程代码执行的行为。
        Netcat常被用于建立反向Shell或端口转发。
        MITRE ATT&CK: T1059 - Command and Scripting Interpreter
      conditions:
        - event_type: process_create
        - comm: "regex:^(nc|ncat|netcat)$"
      severity: high
      logic_operator: AND
      tags:
        - maturity_stable
        - host
        - network
        - mitre_execution
        - T1059
      enabled: true
      throttle_seconds: 30
      actions:
        - log
      category: network

    - name: Suspicious outbound connection
      description: |
        可疑的出站连接，检测常见恶意端口和非标准服务端口的连接。
      conditions:
        - event_type: connect
        - dst_addr.port: "in:[4444,5555,6666,7777,8888,9999,12345,54321,31337]"
      severity: medium
      logic_operator: AND
      tags:
        - maturity_stable
        - host
        - network
        - mitre_command_and_control
        - T1071
      enabled: true
      throttle_seconds: 60
      actions:
        - log
      category: network

    - name: Connection to non-standard SSH port
      description: |
        连接到非标准SSH端口，可能是反向隧道或隐蔽通信。
        MITRE ATT&CK: T1572 - Protocol Tunneling
      conditions:
        - event_type: connect
        - comm: "regex:^ssh$"
        - dst_addr.port: "notin:[22]"
      severity: medium
      logic_operator: AND
      tags:
        - maturity_stable
        - host
        - network
        - mitre_command_and_control
        - T1572
      enabled: true
      throttle_seconds: 60
      actions:
        - log
      category: network

    # ----- 端口扫描检测 -----
    - name: Port scanning behavior
      description: |
        检测端口扫描行为，短时间内连接大量不同端口。
        MITRE ATT&CK: T1046 - Network Service Scanning
      conditions:
        - event_type: connect
        - comm: "regex:^(nmap|masscan|zmap|nc|ncat)$"
      severity: medium
      logic_operator: AND
      tags:
        - maturity_stable
        - host
        - network
        - mitre_discovery
        - T1046
      enabled: true
      throttle_seconds: 60
      actions:
        - log
      category: network

    # ----- DNS异常检测 -----
    - name: Suspicious DNS query
      description: |
        可疑的DNS查询，包括DGA域名特征和已知恶意域名模式。
        MITRE ATT&CK: T1071.004 - Application Layer Protocol: DNS
      conditions:
        - event_type: connect
        - dst_addr.port: 53
        - comm: "regex:^(nslookup|dig|host)$"
      severity: low
      logic_operator: AND
      tags:
        - maturity_stable
        - host
        - network
        - mitre_command_and_control
        - T1071.004
      enabled: true
      throttle_seconds: 120
      actions:
        - log
      category: network

    # ----- 网络监听检测 -----
    - name: Suspicious network listener
      description: |
        检测可疑的网络监听行为，如非特权用户监听特权端口。
        MITRE ATT&CK: T1571 - Non-Standard Port
      conditions:
        - event_type: listen
        - uid: ">=1000"
        - dst_addr.port: "<1024"
      severity: high
      logic_operator: AND
      tags:
        - maturity_stable
        - host
        - network
        - mitre_persistence
        - T1571
      enabled: true
      throttle_seconds: 30
      actions:
        - log
      category: network

  # ==================== 进程安全规则 ====================
  process:
    # ----- 权限提升检测 -----
    - name: Privilege escalation via sudo
      description: |
        通过sudo进行权限提升。监控sudo命令的使用，特别是成功的提权行为。
        MITRE ATT&CK: T1548.003 - Abuse Elevation Control Mechanisms: Sudo
      conditions:
        - event_type: process_create
        - comm: "regex:^(sudo|su)$"
        - uid: ">=1000"
      severity: medium
      logic_operator: AND
      tags:
        - maturity_stable
        - host
        - process
        - mitre_privilege_escalation
        - T1548.003
      enabled: true
      throttle_seconds: 30
      actions:
        - log
      category: process

    - name: SUID binary execution
      description: |
        执行SUID二进制文件，攻击者常利用SUID程序进行权限提升。
        MITRE ATT&CK: T1548.001 - Abuse Elevation Control Mechanisms: Setuid and Setgid
      conditions:
        - event_type: process_create
        - filename: "regex:/usr/bin/(sudo|passwd|chsh|chfn|gpasswd|newgrp|su|pkexec)$"
        - uid: ">=1000"
      severity: medium
      logic_operator: AND
      tags:
        - maturity_stable
        - host
        - process
        - mitre_privilege_escalation
        - T1548.001
      enabled: true
      throttle_seconds: 60
      actions:
        - log
      category: process

    - name: User added to privileged group
      description: |
        用户被添加到特权组（root、sudo、wheel等）。
        MITRE ATT&CK: T1098 - Account Manipulation
      conditions:
        - event_type: process_create
        - cmdline: "regex:.*(usermod|gpasswd|adduser).*(root|sudo|wheel|admin|docker).*"
      severity: critical
      logic_operator: AND
      tags:
        - maturity_stable
        - host
        - process
        - mitre_persistence
        - T1098
      enabled: true
      throttle_seconds: 10
      actions:
        - log
      category: process

    # ----- Shell执行检测 -----
    - name: Shell spawned by web server
      description: |
        Web服务器进程启动Shell，通常是Web应用漏洞利用的迹象。
        MITRE ATT&CK: T1505.003 - Server Software Component: Web Shell
        仅检测Web服务器进程（如nginx、apache、httpd、node等）启动的Shell。
        注意：此规则需要父进程信息，如果无法获取父进程comm，将不会触发。
      conditions:
        - event_type: process_create
        - comm: "regex:^(bash|sh|zsh|fish|dash|ksh)$"
        - ppid: ">1"
      severity: critical
      logic_operator: AND
      tags:
        - maturity_stable
        - host
        - process
        - mitre_persistence
        - T1505.003
      enabled: true
      throttle_seconds: 10
      actions:
        - log
      category: process

    - name: Run shell untrusted
      description: |
        非特权用户启动Shell会话，可能是RCE成功后的行为。
        MITRE ATT&CK: T1059.004 - Command and Scripting Interpreter: Bash
      conditions:
        - event_type: process_create
        - comm: "regex:^(bash|sh|zsh|fish|dash|ksh)$"
        - uid: ">=1000"
      severity: low
      logic_operator: AND
      tags:
        - maturity_stable
        - host
        - process
        - mitre_execution
        - T1059.004
      enabled: true
      throttle_seconds: 120
      actions:
        - log
      category: process

    # ----- 敏感命令检测 -----
    - name: Password file manipulation
      description: |
        操作密码相关文件，可能是添加后门账户或修改认证配置。
        MITRE ATT&CK: T1098 - Account Manipulation
      conditions:
        - event_type: process_create
        - cmdline: "regex:.*(passwd|chpasswd|useradd|usermod|userdel|adduser).*(root|admin).*"
      severity: high
      logic_operator: AND
      tags:
        - maturity_stable
        - host
        - process
        - mitre_persistence
        - T1098
      enabled: true
      throttle_seconds: 30
      actions:
        - log
      category: process

    - name: Cron job manipulation
      description: |
        修改cron任务，攻击者常用的持久化手段。
        MITRE ATT&CK: T1053.003 - Scheduled Task/Job: Cron
      conditions:
        - event_type: process_create
        - cmdline: "regex:.*(crontab|cron).*(-e|-l|-r).*"
      severity: medium
      logic_operator: AND
      tags:
        - maturity_stable
        - host
        - process
        - mitre_persistence
        - T1053.003
      enabled: true
      throttle_seconds: 60
      actions:
        - log
      category: process

    - name: Systemd service manipulation
      description: |
        操作systemd服务，可能用于持久化或禁用安全服务。
        MITRE ATT&CK: T1543.002 - Create or Modify System Process: Systemd Service
      conditions:
        - event_type: process_create
        - cmdline: "regex:.*systemctl.*(enable|disable|start|stop|restart|create).*"
      severity: medium
      logic_operator: AND
      tags:
        - maturity_stable
        - host
        - process
        - mitre_persistence
        - T1543.002
      enabled: true
      throttle_seconds: 60
      actions:
        - log
      category: process

    # ----- 脚本执行检测 -----
    - name: Suspicious script execution
      description: |
        可疑的脚本执行行为，包括从网络下载并执行脚本。
        MITRE ATT&CK: T1059 - Command and Scripting Interpreter
      conditions:
        - event_type: process_create
        - cmdline: "regex:.*(curl|wget).*\\|.*(bash|sh|python|perl).*"
      severity: critical
      logic_operator: AND
      tags:
        - maturity_stable
        - host
        - process
        - mitre_execution
        - T1059
      enabled: true
      throttle_seconds: 10
      actions:
        - log
      category: process

    - name: Python reverse shell
      description: |
        Python反向Shell，攻击者常用的远程控制手段。
        MITRE ATT&CK: T1059.006 - Command and Scripting Interpreter: Python
      conditions:
        - event_type: process_create
        - cmdline: "regex:.*python.*socket.*PTY.*"
      severity: critical
      logic_operator: AND
      tags:
        - maturity_stable
        - host
        - process
        - mitre_execution
        - T1059.006
      enabled: true
      throttle_seconds: 10
      actions:
        - log
      category: process

    - name: Perl reverse shell
      description: |
        Perl反向Shell，另一种常见的远程控制手段。
        MITRE ATT&CK: T1059.010 - Command and Scripting Interpreter: Perl
      conditions:
        - event_type: process_create
        - cmdline: "regex:.*perl.*socket.*"
      severity: critical
      logic_operator: AND
      tags:
        - maturity_stable
        - host
        - process
        - mitre_execution
        - T1059.010
      enabled: true
      throttle_seconds: 10
      actions:
        - log
      category: process

  # ==================== 权限与内存安全规则 ====================
  permission:
    # ----- PTRACE检测 -----
    - name: PTRACE attach detected
      description: |
        检测ptrace附加行为，攻击者可能利用ptrace进行进程注入或调试。
        MITRE ATT&CK: T1055.008 - Process Injection: Ptrace System Calls
      conditions:
        - event_type: ptrace
      severity: high
      logic_operator: AND
      tags:
        - maturity_stable
        - host
        - mitre_privilege_escalation
        - T1055.008
      enabled: true
      throttle_seconds: 30
      actions:
        - log
      category: permission

    - name: PTRACE anti-debug attempt
      description: |
        检测PTRACE_TRACEME调用，可能是恶意软件的反调试技术。
        MITRE ATT&CK: T1622 - Debugger Evasion
      conditions:
        - event_type: ptrace
        - signal: "PTRACE_TRACEME"
      severity: medium
      logic_operator: AND
      tags:
        - maturity_stable
        - host
        - mitre_defense_evasion
        - T1622
      enabled: true
      throttle_seconds: 60
      actions:
        - log
      category: permission

    # ----- 文件权限修改 -----
    - name: Chmod to executable
      description: |
        将文件权限修改为可执行，可能是为了执行恶意代码。
        MITRE ATT&CK: T1222.002 - Linux and Mac File and Directory Permissions Modification
      conditions:
        - event_type: chmod
        - mode: "regex:.*[1457][0457][0457]$"
      severity: low
      logic_operator: AND
      tags:
        - maturity_stable
        - host
        - mitre_defense_evasion
        - T1222.002
      enabled: true
      throttle_seconds: 120
      actions:
        - log
      category: permission

    - name: Chown file ownership change
      description: |
        文件所有者变更，可能是权限提升的一部分。
        MITRE ATT&CK: T1222.002 - Linux and Mac File and Directory Permissions Modification
      conditions:
        - event_type: chown
        - uid: ">=1000"
      severity: low
      logic_operator: AND
      tags:
        - maturity_stable
        - host
        - mitre_defense_evasion
        - T1222.002
      enabled: true
      throttle_seconds: 120
      actions:
        - log
      category: permission

    # ----- Capabilities操作 -----
    - name: Setcap execution
      description: |
        设置文件capabilities，可能被用于权限提升。
        MITRE ATT&CK: T1548.001 - Abuse Elevation Control Mechanisms: Setuid and Setgid
      conditions:
        - event_type: process_create
        - comm: "setcap"
      severity: high
      logic_operator: AND
      tags:
        - maturity_stable
        - host
        - mitre_privilege_escalation
        - T1548.001
      enabled: true
      throttle_seconds: 30
      actions:
        - log
      category: permission

  memory:
    # ----- 内存操作检测 -----
    - name: Mprotect with RWX
      description: |
        使用mprotect设置内存为可读写执行，这是代码注入的典型特征。
        攻击者常使用此技术注入shellcode。
        MITRE ATT&CK: T1055 - Process Injection
        排除常见的合法进程，减少误报。
      conditions:
        - event_type: mprotect
        - prot: "PROT_READ|PROT_WRITE|PROT_EXEC"
        - comm: "not_regex:^(bash|sh|zsh|fish|dash|ksh|csh|tcsh|awk|sed|grep|find|vim|nano|less|more|man|ssh|scp|sftp|gpg|sudo|su|login|systemd|dbus|Xorg|Xwayland|kwin|gnome|firefox|chrome|chromium|electron)$"
      severity: critical
      logic_operator: AND
      tags:
        - maturity_stable
        - host
        - mitre_defense_evasion
        - T1055
      enabled: true
      throttle_seconds: 10
      actions:
        - log
      category: memory

    - name: Mmap executable memory
      description: |
        映射可执行内存区域，可能是shellcode注入或JIT编译行为。
        MITRE ATT&CK: T1055 - Process Injection
        排除常见的合法进程（shell、终端、浏览器等），减少误报。
      conditions:
        - event_type: mmap
        - prot: "regex:.*PROT_EXEC.*"
        - comm: "not_regex:^(bash|sh|zsh|fish|dash|ksh|csh|tcsh|awk|sed|grep|find|vim|nano|less|more|man|ssh|scp|sftp|gpg|sudo|su|login|systemd|dbus|Xorg|Xwayland|kwin|gnome|firefox|chrome|chromium|electron)$"
      severity: high
      logic_operator: AND
      tags:
        - maturity_stable
        - host
        - mitre_defense_evasion
        - T1055
      enabled: true
      throttle_seconds: 30
      actions:
        - log
      category: memory

    - name: Memfd_create fileless execution
      description: |
        使用memfd_create创建内存文件，这是无文件恶意软件的典型技术。
        MITRE ATT&CK: T1620 - Reflective Code Loading
      conditions:
        - event_type: process_create
        - filename: "regex:/memfd:.*"
      severity: critical
      logic_operator: AND
      tags:
        - maturity_stable
        - host
        - mitre_defense_evasion
        - T1620
      enabled: true
      throttle_seconds: 10
      actions:
        - log
      category: memory

  # ==================== 系统级安全规则 ====================
  system:
    # ----- 内核模块检测 -----
    - name: Kernel module load
      description: |
        加载内核模块，可能是rootkit或内核级恶意软件。
        MITRE ATT&CK: T1547.006 - Boot or Logon Autostart Execution: Kernel Modules and Extensions
      conditions:
        - event_type: process_create
        - comm: "regex:^(insmod|modprobe)$"
      severity: critical
      logic_operator: AND
      tags:
        - maturity_stable
        - host
        - mitre_persistence
        - T1547.006
      enabled: true
      throttle_seconds: 10
      actions:
        - log
      category: system

    - name: Kernel module unload
      description: |
        卸载内核模块，可能是为了禁用安全软件。
        MITRE ATT&CK: T1547.006 - Boot or Logon Autostart Execution: Kernel Modules and Extensions
      conditions:
        - event_type: process_create
        - comm: "rmmod"
      severity: high
      logic_operator: AND
      tags:
        - maturity_stable
        - host
        - mitre_defense_evasion
        - T1547.006
      enabled: true
      throttle_seconds: 30
      actions:
        - log
      category: system

    # ----- 用户管理检测 -----
    - name: User creation
      description: |
        创建新用户账户，可能是攻击者建立持久访问。
        MITRE ATT&CK: T1136.001 - Create Account: Local Account
      conditions:
        - event_type: process_create
        - comm: "regex:^(useradd|adduser)$"
      severity: high
      logic_operator: AND
      tags:
        - maturity_stable
        - host
        - mitre_persistence
        - T1136.001
      enabled: true
      throttle_seconds: 30
      actions:
        - log
      category: system

    - name: User deletion
      description: |
        删除用户账户，可能是攻击者清理痕迹或破坏系统。
        MITRE ATT&CK: T1531 - Account Access Removal
      conditions:
        - event_type: process_create
        - comm: "regex:^(userdel|deluser)$"
      severity: high
      logic_operator: AND
      tags:
        - maturity_stable
        - host
        - mitre_impact
        - T1531
      enabled: true
      throttle_seconds: 30
      actions:
        - log
      category: system

    # ----- 系统配置修改 -----
    - name: Iptables modification
      description: |
        修改iptables规则，可能是为了禁用防火墙或开放后门端口。
        MITRE ATT&CK: T1562.004 - Impair Defenses: Disable or Modify System Firewall
      conditions:
        - event_type: process_create
        - comm: "iptables"
      severity: high
      logic_operator: AND
      tags:
        - maturity_stable
        - host
        - mitre_defense_evasion
        - T1562.004
      enabled: true
      throttle_seconds: 30
      actions:
        - log
      category: system

    - name: Selinux modification
      description: |
        修改SELinux配置，可能是为了禁用安全模块。
        MITRE ATT&CK: T1562.001 - Impair Defenses: Disable or Modify Tools
      conditions:
        - event_type: process_create
        - cmdline: "regex:.*(setenforce|semanage|semodule).*(0|permissive|disabled).*"
      severity: critical
      logic_operator: AND
      tags:
        - maturity_stable
        - host
        - mitre_defense_evasion
        - T1562.001
      enabled: true
      throttle_seconds: 10
      actions:
        - log
      category: system

    # ----- 敏感信息收集 -----
    - name: Credentials harvesting
      description: |
        搜索敏感凭据文件，攻击者常用的信息收集手段。
        MITRE ATT&CK: T1552 - Credentials in Files
      conditions:
        - event_type: process_create
        - cmdline: "regex:.*(grep|find).*(password|credential|secret|key|token).*"
      severity: high
      logic_operator: AND
      tags:
        - maturity_stable
        - host
        - mitre_credential_access
        - T1552
      enabled: true
      throttle_seconds: 30
      actions:
        - log
      category: system

    - name: System information gathering
      description: |
        收集系统信息，通常是侦察阶段的行为。
        MITRE ATT&CK: T1082 - System Information Discovery
      conditions:
        - event_type: process_create
        - comm: "regex:^(uname|hostnamectl|cat|lscpu|free|df|mount|lsblk|fdisk|dmidecode)$"
        - cmdline: "regex:.*/(proc|etc)/(cpuinfo|meminfo|hostname|os-release|passwd|group|shadow).*"
      severity: low
      logic_operator: AND
      tags:
        - maturity_stable
        - host
        - mitre_discovery
        - T1082
      enabled: true
      throttle_seconds: 120
      actions:
        - log
      category: system

# ==================== 白名单配置 ====================
whitelist:
  # 白名单进程（这些进程触发的告警将被忽略）
  processes:
    - systemd
    - systemd-journald
    - systemd-logind
    - dbus-daemon
    - NetworkManager
    - rsyslogd
    - cron
    - atd
    - sshd
    - sudo
    - polkitd
    - auditd

  # 白名单用户（这些用户的告警将被忽略）
  users: []

  # 白名单文件路径
  files:
    - /proc/
    - /sys/
    - /dev/null
    - /dev/zero
    - /dev/random
    - /dev/urandom

  # 白名单网络（CIDR格式）
  networks:
    - 127.0.0.0/8
    - ::1/128

# ==================== 响应动作配置 ====================
response_actions:
  critical_severity:
    - log
    - alert

  high_severity:
    - log
    - alert

  medium_severity:
    - log

  low_severity:
    - log
