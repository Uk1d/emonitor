# 存储配置 - MySQL 分库架构
#
# 数据库分离说明：
# - etracee_events: 监控程序数据库，存储事件和告警数据
# - etracee_web: Web 服务数据库，存储用户和会话数据
#
# 环境变量优先级（高于此配置文件）：
# 监控程序数据库：
#   MYSQL_EVENTS_HOST, MYSQL_EVENTS_PORT, MYSQL_EVENTS_USER, MYSQL_EVENTS_PASSWORD, MYSQL_EVENTS_DATABASE
#   或使用通用变量：MYSQL_HOST, MYSQL_PORT, MYSQL_USER, MYSQL_PASSWORD
#
# Web 服务数据库：
#   MYSQL_WEB_HOST, MYSQL_WEB_PORT, MYSQL_WEB_USER, MYSQL_WEB_PASSWORD, MYSQL_WEB_DATABASE
#   或使用通用变量：MYSQL_HOST, MYSQL_PORT, MYSQL_USER, MYSQL_PASSWORD

storage:
  backend: mysql

  # 监控程序使用的数据库（存储事件和告警）
  mysql:
    host: localhost
    port: 3306
    user: root
    password: ""
    database: etracee_events    # 监控程序数据库
    max_open_conns: 50
    max_idle_conns: 10
    conn_max_lifetime_seconds: 3600

  # 数据保留策略
  retention_days: 30

# Web 服务数据库配置说明：
# Web 服务使用独立的数据库 (etracee_web) 存储用户认证和会话信息
# 配置通过环境变量设置：
#
# 必需环境变量（Web 服务认证）：
#   MYSQL_WEB_HOST=localhost
#   MYSQL_WEB_USER=root
#   MYSQL_WEB_PASSWORD=your_password
#   MYSQL_WEB_DATABASE=etracee_web
#
# 可选环境变量：
#   ADMIN_USERNAME=admin          # 管理员用户名（默认：admin）
#   ADMIN_PASSWORD=admin123       # 管理员密码（默认：admin123，请及时修改）
#   JWT_SECRET=your_secret_key    # JWT 密钥（默认：自动生成）
#
# Web 服务启动命令示例：
#   MYSQL_WEB_HOST=localhost MYSQL_WEB_USER=root MYSQL_WEB_PASSWORD=password \
#   ADMIN_USERNAME=admin ADMIN_PASSWORD=secure_password \
#   ./webserver
