# eTracee 数据库配置文件
# 包含监控程序和 Web 服务的 MySQL 数据库连接信息

# 监控程序数据库 - 存储事件和告警数据
monitor_database:
  host: localhost
  port: 3306
  user: your_mysql_user_name
  password: "your_mysql_password"          # 请修改为实际密码
  database: etracee_events           # 监控程序数据库名
  max_open_conns: 50
  max_idle_conns: 10
  conn_max_lifetime_seconds: 3600

# Web 服务数据库 - 存储用户和会话数据
web_database:
  host: localhost
  port: 3306
  user: your_mysql_user_name
  password: "your_mysql_password"           # 请修改为实际密码
  database: etracee_web              # Web 服务数据库名
  max_open_conns: 10
  max_idle_conns: 5
  conn_max_lifetime_seconds: 3600

# 管理员账户配置
admin:
  username: admin                    # 管理员用户名
  password: admin123                 # 管理员密码（请及时修改）

# JWT 配置
jwt:
  secret: ""                         # JWT 密钥，留空则自动生成
  expiry_hours: 24                   # 令牌有效期（小时）

# 数据保留策略
retention_days: 30                   # 事件数据保留天数
