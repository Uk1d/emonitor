  - name: Read sensitive file trusted after startup [variant 1]
    description: An attempt to read any sensitive file (e.g. files containing user/password/authentication
      information) by a trusted program after startup. Trusted programs might read
      these files at startup to load initial state, but not afterwards. Can be customized
      as needed. In modern containerized cloud infrastructures, accessing traditional
      Linux sensitive files  might be less relevant, yet it remains valuable for baseline
      detections. While we provide additional  rules for SSH or cloud vendor-specific
      credentials, you can significantly enhance your security  program by crafting
      custom rules for critical application credentials unique to your environment.
    conditions:
    - event_type:
      - openat
    - filename:
      - /etc/shadow
      - /etc/sudoers
      - /etc/pam.conf
      - /etc/security/pwquality.conf
    - comm:
      - nginx
      - httpd
      - httpd-foregroun
      - lighttpd
      - apache
      - apache2
      - mysqld
      - postgres
      - sqlplus
      - docker
      - dockerd
      - containerd-shim
      - runc:[1:CHILD]
      - pause
      - exe
      - docker-compose
      - docker-entrypoi
      - docker-runc-cur
      - docker-current
      - dockerd-current
      - sshd
    - comm:
        operator: not_equals
        value: sshd
    severity: medium
    logic_operator: AND
    tags:
    - maturity_stable
    - host
    - container
    - filesystem
    - mitre_credential_access
    - T1555
    enabled: true
    throttle_seconds: 0
    actions:
    - log
    metadata:
      disabled_reason: unmapped_fields
      expanded_cond: |-
        ((evt.type in (open,openat,openat2) and evt.is_open_read=true and fd.typechar='f' and fd.num>=0))  and ((fd.name in (sensitive_file_names) or
          fd.directory in (/etc/sudoers.d, /etc/pam.d)))  and ((proc.name in (http_server_binaries, db_server_binaries, docker_binaries, sshd)))  and not ((proc.duration <= 5000000000))  and proc.name!="sshd"  and not ((((evt.num=0))))
      original_output: Sensitive file opened for reading by trusted program after
        startup | file=%fd.name pcmdline=%proc.pcmdline gparent=%proc.aname[2] ggparent=%proc.aname[3]
        gggparent=%proc.aname[4] evt_type=%evt.type user=%user.name user_uid=%user.uid
        user_loginuid=%user.loginuid process=%proc.name proc_exepath=%proc.exepath
        parent=%proc.pname command=%proc.cmdline terminal=%proc.tty
      original_rule_name: Read sensitive file trusted after startup
      priority: WARNING
      raw_condition: open_read  and sensitive_files  and server_procs  and not proc_is_new  and
        proc.name!="sshd"  and not user_known_read_sensitive_files_activities
      source: falco
      unmapped_fields: evt.is_open_read,fd.typechar,fd.num
      unparsed_conditions: not ((proc.duration <= 5000000000)) | not ((((evt.num=0))))
      variant_index: "1"
      variant_total: "2"
    category: file
