  - name: Clear Log Activities [variant 1]
    description: Detect clearing of critical access log files, typically done to erase
      evidence that could be attributed to an adversary's  actions. To effectively
      customize and operationalize this detection, check for potentially missing log
      file destinations  relevant to your environment, and adjust the profiled containers
      you wish not to be alerted on.
    conditions:
    - event_type:
      - openat
    - flags:
        operator: contains
        value: O_TRUNC
    severity: medium
    logic_operator: AND
    tags:
    - maturity_stable
    - host
    - container
    - filesystem
    - mitre_defense_evasion
    - T1070
    - NIST_800-53_AU-10
    enabled: true
    throttle_seconds: 0
    actions:
    - log
    metadata:
      disabled_reason: unmapped_fields
      expanded_cond: ((evt.type in (open,openat,openat2) and evt.is_open_write=true
        and fd.typechar='f' and fd.num>=0))  and ((fd.directory in (log_directories)
        or fd.filename in (log_files)))  and evt.arg.flags contains "O_TRUNC"  and
        not ((proc.name=containerd and (fd.name startswith "/var/lib/containerd/io.containerd.snapshotter.v1.overlayfs/snapshots/"
        or fd.name startswith "/var/lib/rancher/k3s/agent/containerd/io.containerd.snapshotter.v1.overlayfs/snapshots"
        or fd.name startswith "/var/lib/containerd/tmpmounts/" or fd.name startswith
        "/var/lib/rancher/k3s/agent/containerd/tmpmounts/"))) and not ((container.image.repository
        endswith "splunk/fluentd-hec" or container.image.repository endswith "fluent/fluentd-kubernetes-daemonset"
        or container.image.repository endswith "openshift3/ose-logging-fluentd" or
        container.image.repository endswith "containernetworking/azure-npm"))  and
        not ((((evt.num=0))))
      original_output: Log files were tampered | file=%fd.name evt_type=%evt.type
        user=%user.name user_uid=%user.uid user_loginuid=%user.loginuid process=%proc.name
        proc_exepath=%proc.exepath parent=%proc.pname command=%proc.cmdline terminal=%proc.tty
      original_rule_name: Clear Log Activities
      priority: WARNING
      raw_condition: open_write  and access_log_files  and evt.arg.flags contains
        "O_TRUNC"  and not containerd_activities and not trusted_logging_images  and
        not allowed_clear_log_files
      source: falco
      unmapped_fields: evt.is_open_write,fd.typechar,fd.num,fd.directory
