global:
  enable_file_events: true
  enable_network_events: true
  enable_process_events: true
  enable_permission_events: true
  enable_memory_events: true
  min_uid_filter: 0
  max_uid_filter: 65535
  max_events_per_second: 10000
  ring_buffer_size: 0
  alert_throttle_seconds: 60
  max_alert_history: 1000
  enable_rule_stats: true
  log_level: info
detection_rules:
  file:
  - name: Directory traversal monitored file read [variant 1]
    description: Web applications can be vulnerable to directory traversal attacks
      that allow accessing files outside of the web app's root directory  (e.g. Arbitrary
      File Read bugs). System directories like /etc are typically accessed via absolute
      paths. Access patterns outside of this  (here path traversal) can be regarded
      as suspicious. This rule includes failed file open attempts.
    conditions:
    - event_type:
      - openat
    - filename:
        operator: regex
        pattern: ^/etc/
    - comm:
        operator: not_in
        value:
        - ash
        - bash
        - csh
        - ksh
        - sh
        - tcsh
        - zsh
        - dash
    severity: medium
    logic_operator: AND
    tags:
    - maturity_stable
    - host
    - container
    - filesystem
    - mitre_credential_access
    - T1555
    enabled: true
    throttle_seconds: 0
    actions:
    - log
    metadata:
      disabled_reason: unmapped_fields
      expanded_cond: "(((evt.type in (open,openat,openat2) and evt.is_open_read=true
        and fd.typechar='f' and fd.num>=0)) or ((evt.type in (open,openat,openat2)
        and fd.typechar='f' and fd.num=-1 and evt.res startswith E)))  and (((fd.name
        startswith /etc/)) or ((fd.name contains '/.ssh/' and fd.name glob '/home/*/.ssh/*'))
        or \n     fd.name startswith /root/.ssh or \n     fd.name contains \"id_rsa\")
        \nand ((fd.nameraw contains '../' and fd.nameraw glob '*../*../*'))  and not
        proc.pname in (shell_binaries)"
      original_output: Read monitored file via directory traversal | file=%fd.name
        fileraw=%fd.nameraw gparent=%proc.aname[2] ggparent=%proc.aname[3] gggparent=%proc.aname[4]
        evt_type=%evt.type user=%user.name user_uid=%user.uid user_loginuid=%user.loginuid
        process=%proc.name proc_exepath=%proc.exepath parent=%proc.pname command=%proc.cmdline
        terminal=%proc.tty
      original_rule_name: Directory traversal monitored file read
      priority: WARNING
      raw_condition: "(open_read or open_file_failed)  and (etc_dir or user_ssh_directory
        or \n     fd.name startswith /root/.ssh or \n     fd.name contains \"id_rsa\")
        \nand directory_traversal  and not proc.pname in (shell_binaries)"
      source: falco
      unmapped_fields: evt.is_open_read,fd.typechar,fd.num,fd.nameraw
      unparsed_conditions: fd.nameraw glob '*../*../*'
      variant_index: "1"
      variant_total: "8"
    category: file
