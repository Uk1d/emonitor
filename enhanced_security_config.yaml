    - log
    metadata:
      disabled_reason: unmapped_fields
      expanded_cond: ((evt.type in (execve, execveat))) and ((container.id != host))
        and proc.is_exe_upper_layer=true  and not container.image.repository in (known_drop_and_execute_containers)
        and not ((((evt.num=0))))
      original_output: Executing binary not part of base image | proc_exe=%proc.exe
