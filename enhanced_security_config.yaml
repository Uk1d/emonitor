      expanded_cond: ((evt.type in (dup, dup2, dup3)))  and ((container.id != host))  and
        evt.rawres in (0, 1, 2)  and fd.type in ("ipv4", "ipv6")  and not ((((evt.num=0))))
      original_output: Redirect stdout/stdin to network connection | gparent=%proc.aname[2]
