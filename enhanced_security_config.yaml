  - name: Search Private Keys or Passwords [variant 1]
    description: Detect attempts to search for private keys or passwords using the
      grep or find command. This is often seen with  unsophisticated attackers, as
      there are many ways to access files using bash built-ins that could go unnoticed.  Regardless,
      this serves as a solid baseline detection that can be tailored to cover these
      gaps while maintaining  an acceptable noise level.
    conditions:
    - event_type:
      - execve
      - execveat
    - comm:
      - grep
      - egrep
      - fgrep
    - cmdline:
        operator: regex
        pattern: (?i)BEGIN PRIVATE
    severity: medium
    logic_operator: AND
    tags:
    - maturity_stable
    - host
    - container
    - process
    - filesystem
    - mitre_credential_access
    - T1552.001
    enabled: true
    throttle_seconds: 0
    actions:
    - log
    metadata:
      expanded_cond: "((evt.type in (execve, execveat)))  and ((((proc.name in (grep_binaries)))
        and ((proc.args icontains \"BEGIN PRIVATE\" or\n proc.args icontains \"BEGIN
        OPENSSH PRIVATE\" or\n proc.args icontains \"BEGIN RSA PRIVATE\" or\n proc.args
        icontains \"BEGIN DSA PRIVATE\" or\n proc.args icontains \"BEGIN EC PRIVATE\"
        or\n (((((evt.num=0)))) and\n  (proc.args icontains \" pass \" or\n   proc.args
        icontains \" ssh \" or\n   proc.args icontains \" user \"))\n))) or\n     (proc.name
        = \"find\" and (proc.args contains \"id_rsa\" or \n                              proc.args
        contains \"id_dsa\" or \n                              proc.args contains
        \"id_ed25519\" or \n                              proc.args contains \"id_ecdsa\"\n
        \     )\n    ))"
      original_output: Grep private keys or passwords activities found | evt_type=%evt.type
        user=%user.name user_uid=%user.uid user_loginuid=%user.loginuid process=%proc.name
        proc_exepath=%proc.exepath parent=%proc.pname command=%proc.cmdline terminal=%proc.tty
        exe_flags=%evt.arg.flags
