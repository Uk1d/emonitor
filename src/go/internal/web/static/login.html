<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>eTracee - 登录</title>
    <style>
        :root {
            --bg: #0f172a; --panel: #1e293b; --text: #e5e7eb; --muted: #94a3b8;
            --accent: #3b82f6; --danger: #ef4444; --success: #10b981;
            --border: #334155; --input-bg: #0f172a;
        }
        [data-theme="light"] {
            --bg: #f1f5f9; --panel: #ffffff; --text: #1e293b; --muted: #64748b;
            --accent: #2563eb; --danger: #dc2626; --success: #059669;
            --border: #e2e8f0; --input-bg: #f8fafc;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            background: var(--bg); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text);
        }
        .login-container {
            background: var(--panel); border-radius: 16px; padding: 40px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.2); width: 100%; max-width: 400px;
            border: 1px solid var(--border);
        }
        .logo {
            display: flex; align-items: center; justify-content: center; gap: 12px;
            margin-bottom: 32px;
        }
        .logo-icon {
            width: 48px; height: 48px; background: linear-gradient(135deg, var(--accent), #8b5cf6);
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            font-size: 24px; color: white; font-weight: bold;
        }
        .logo-text { font-size: 28px; font-weight: 700; }
        .form-group { margin-bottom: 20px; }
        .form-label {
            display: block; font-size: 13px; font-weight: 500; margin-bottom: 8px;
            color: var(--muted);
        }
        .form-input {
            width: 100%; padding: 12px 16px; border: 1px solid var(--border);
            border-radius: 8px; background: var(--input-bg); color: var(--text);
            font-size: 15px; transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-input:focus {
            outline: none; border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }
        .form-input::placeholder { color: var(--muted); }
        .error-message {
            background: rgba(239, 68, 68, 0.1); border: 1px solid var(--danger);
            border-radius: 8px; padding: 12px; margin-bottom: 20px;
            color: var(--danger); font-size: 14px; display: none;
        }
        .error-message.show { display: block; }
        .submit-btn {
            width: 100%; padding: 14px; background: var(--accent); color: white;
            border: none; border-radius: 8px; font-size: 15px; font-weight: 600;
            cursor: pointer; transition: background 0.2s, transform 0.1s;
        }
        .submit-btn:hover { background: #2563eb; }
        .submit-btn:active { transform: scale(0.98); }
        .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .footer {
            margin-top: 24px; text-align: center; font-size: 13px; color: var(--muted);
        }
        .loading {
            display: inline-block; width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.3); border-top-color: white;
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .remember-me {
            display: flex; align-items: center; gap: 8px; margin-bottom: 20px;
        }
        .remember-me input[type="checkbox"] {
            width: 16px; height: 16px; accent-color: var(--accent);
        }
        .remember-me label { font-size: 14px; color: var(--muted); cursor: pointer; }
        .theme-toggle {
            position: absolute; top: 20px; right: 20px;
            background: var(--panel); border: 1px solid var(--border);
            border-radius: 8px; padding: 8px 12px; cursor: pointer;
            color: var(--text); font-size: 13px;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
    </style>
</head>
<body data-theme="dark">
    <button class="theme-toggle" onclick="toggleTheme()">切换主题</button>

    <div class="login-container">
        <div class="logo">
            <div class="logo-icon">E</div>
            <div class="logo-text">eTracee</div>
        </div>

        <div id="error" class="error-message"></div>

        <form id="login-form" onsubmit="return handleLogin(event)">
            <div class="form-group">
                <label class="form-label" for="username">用户名</label>
                <input type="text" id="username" name="username" class="form-input"
                       placeholder="请输入用户名" autocomplete="username" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">密码</label>
                <input type="password" id="password" name="password" class="form-input"
                       placeholder="请输入密码" autocomplete="current-password" required>
            </div>

            <div class="remember-me">
                <input type="checkbox" id="remember" name="remember">
                <label for="remember">记住登录状态</label>
            </div>

            <button type="submit" class="submit-btn" id="submit-btn">登录</button>
        </form>

        <div class="footer">eTracee 安全监控系统 v1.0</div>
    </div>

    <script>
        function toggleTheme() {
            const body = document.body;
            const next = body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            body.setAttribute('data-theme', next);
            localStorage.setItem('etracee-theme', next);
        }

        (function() {
            const saved = localStorage.getItem('etracee-theme') || 'dark';
            document.body.setAttribute('data-theme', saved);
        })();

        async function checkAuth() {
            const token = localStorage.getItem('auth_token');
            if (!token) return;
            try {
                const resp = await fetch('/api/check-auth', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const data = await resp.json();
                if (data.authenticated) window.location.href = '/';
            } catch(e) {}
        }

        async function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;
            const errorDiv = document.getElementById('error');
            const submitBtn = document.getElementById('submit-btn');

            errorDiv.classList.remove('show');
            errorDiv.textContent = '';
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loading"></span> 登录中...';

            try {
                const resp = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                // 尝试解析响应体，即使状态码不是 2xx
                let data = {};
                try {
                    data = await resp.json();
                } catch(parseErr) {
                    // JSON 解析失败，可能是网络问题或服务器错误
                    throw new Error('服务器响应异常');
                }

                if (data.success) {
                    localStorage.setItem('auth_token', data.token);
                    localStorage.setItem('auth_expires', data.expires);
                    if (remember) localStorage.setItem('remember_login', 'true');
                    window.location.href = '/';
                } else {
                    // 显示后端返回的错误消息
                    errorDiv.textContent = data.message || '登录失败';
                    errorDiv.classList.add('show');
                    document.querySelector('.login-container').style.animation = 'shake 0.3s';
                    setTimeout(() => {
                        document.querySelector('.login-container').style.animation = '';
                    }, 300);
                }
            } catch(err) {
                errorDiv.textContent = err.message || '网络错误，请稍后重试';
                errorDiv.classList.add('show');
            }
            submitBtn.disabled = false;
            submitBtn.textContent = '登录';
            return false;
        }

        checkAuth();
    </script>
</body>
</html>
